<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA GitHub Pages redirect: 경로를 sessionStorage에 저장 후 루트로 이동
      var path = window.location.pathname.replace('/ai-quiz', '') || '/'
      sessionStorage.setItem('spa_redirect', path + window.location.search + window.location.hash)
      window.location.replace('/ai-quiz/')
    </script>
  </head>
  <body></body>
</html>
