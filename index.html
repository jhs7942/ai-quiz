      (function () {
        var noAdRoutes = ['/quiz', '/result'];
        var path = window.location.pathname;
        if (!noAdRoutes.some(function (r) { return path === r || path.startsWith(r + '/'); })) {
          var s = document.createElement('script');
          s.async = true;
          s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9907319302562189';
          s.crossOrigin = 'anonymous';
          document.head.appendChild(s);
        }
      })();
    </script>
    <script>
      // SPA GitHub Pages: 404.html에서 저장한 경로로 이동
      var redirect = sessionStorage.getItem('spa_redirect')
      if (redirect) {
        sessionStorage.removeItem('spa_redirect')
        window.history.replaceState(null, '', '/ai-quiz' + redirect)
      }
